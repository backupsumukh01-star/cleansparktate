services:
  - type: web
    name: cleansparktate
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: COOKIE_SECURE
        value: "true"
      - key: SITE_PASSWORD
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: TELEGRAM_BOT_TOKEN_USER1
        sync: false
      - key: TELEGRAM_CHAT_ID_USER1
        sync: false
      - key: TELEGRAM_BOT_TOKEN_USER2
        sync: false
      - key: TELEGRAM_CHAT_ID_USER2
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
